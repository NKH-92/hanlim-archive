name: One-time repository cleanup

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/repository-cleanup-once.yml"

permissions:
  contents: write

jobs:
  cleanup:
    if: github.repository == 'NKH-92/hanlim-archive'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify target and capture stale refs
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: 8c6aba6b58295239d51a8c543c44b032db53e462
        shell: bash
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY}"
          default_branch="$(gh api "repos/${repo}" --jq '.default_branch')"
          if [[ "${default_branch}" != "main" ]]; then
            echo "Unexpected default branch: ${default_branch}" >&2
            exit 1
          fi

          main_sha="$(gh api "repos/${repo}/git/ref/heads/main" --jq '.object.sha')"
          compare_status="$(gh api "repos/${repo}/compare/${RELEASE_SHA}...${main_sha}" --jq '.status')"
          case "${compare_status}" in
            identical|ahead) ;;
            *)
              echo "Release SHA is not an ancestor of main: ${compare_status}" >&2
              exit 1
              ;;
          esac

          open_pr_count="$(gh api "repos/${repo}/pulls?state=open&per_page=100" --jq 'length')"
          if [[ "${open_pr_count}" != "0" ]]; then
            echo "Open pull requests exist; refusing branch cleanup." >&2
            exit 1
          fi

          branches=(
            "agent/archive-usability-updates"
            "agent/deploy-propagation-smoke"
            "agent/main-admin-password-reset"
            "agent/periodic-disposal-campaign"
            "agent/repository-final-cleanup"
            "agent/repository-hygiene"
            "cleanup/v1-baseline"
            "codex/audit-trail-detail-cleanup"
            "codex/excel-snapshot-sync"
            "codex/fix-excel-template-upload"
            "codex/fix-floor-rack-links"
            "codex/fix-static-asset-routing"
            "codex/harden-archive-integrity"
            "codex/refactor-archive-system"
            "improve/excel-snapshot-integrity"
          )

          {
            printf '# repository\t%s\n' "${repo}"
            printf '# release_sha\t%s\n' "${RELEASE_SHA}"
            printf '# main_sha\t%s\n' "${main_sha}"
            printf '# captured_at\t%s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > stale-branch-refs.tsv

          for branch in "${branches[@]}"; do
            if ref_sha="$(gh api "repos/${repo}/git/ref/heads/${branch}" --jq '.object.sha' 2>/dev/null)"; then
              printf '%s\t%s\n' "${branch}" "${ref_sha}" >> stale-branch-refs.tsv
            else
              printf '%s\talready-absent\n' "${branch}" >> stale-branch-refs.tsv
            fi
          done

      - name: Preserve deleted-ref recovery record
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: repository-cleanup-refs-${{ github.run_id }}
          path: stale-branch-refs.tsv
          if-no-files-found: error
          retention-days: 90

      - name: Create release tag and delete verified stale branches
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: 8c6aba6b58295239d51a8c543c44b032db53e462
          RELEASE_TAG: v0.1.0
        shell: bash
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY}"
          if gh api "repos/${repo}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists; refusing to replace it." >&2
            exit 1
          fi

          tag_object_sha="$(
            gh api \
              --method POST \
              "repos/${repo}/git/tags" \
              -f tag="${RELEASE_TAG}" \
              -f message="Hanlim Archive ${RELEASE_TAG} production release" \
              -f object="${RELEASE_SHA}" \
              -f type="commit" \
              --jq '.sha'
          )"
          gh api \
            --method POST \
            "repos/${repo}/git/refs" \
            -f ref="refs/tags/${RELEASE_TAG}" \
            -f sha="${tag_object_sha}" \
            >/dev/null

          while IFS=$'\t' read -r branch expected_sha; do
            [[ "${branch}" == \#* ]] && continue
            [[ "${expected_sha}" == "already-absent" ]] && continue

            current_sha="$(gh api "repos/${repo}/git/ref/heads/${branch}" --jq '.object.sha')"
            if [[ "${current_sha}" != "${expected_sha}" ]]; then
              echo "Branch moved after capture: ${branch}" >&2
              exit 1
            fi

            gh api \
              --method DELETE \
              "repos/${repo}/git/refs/heads/${branch}" \
              >/dev/null
          done < stale-branch-refs.tsv

      - name: Verify cleanup result
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: 8c6aba6b58295239d51a8c543c44b032db53e462
          RELEASE_TAG: v0.1.0
        shell: bash
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY}"
          tag_object_sha="$(gh api "repos/${repo}/git/ref/tags/${RELEASE_TAG}" --jq '.object.sha')"
          tag_target_sha="$(gh api "repos/${repo}/git/tags/${tag_object_sha}" --jq '.object.sha')"
          if [[ "${tag_target_sha}" != "${RELEASE_SHA}" ]]; then
            echo "Unexpected tag target: ${tag_target_sha}" >&2
            exit 1
          fi

          while IFS=$'\t' read -r branch expected_sha; do
            [[ "${branch}" == \#* ]] && continue
            [[ "${expected_sha}" == "already-absent" ]] && continue

            if gh api "repos/${repo}/git/ref/heads/${branch}" >/dev/null 2>&1; then
              echo "Branch still exists: ${branch}" >&2
              exit 1
            fi
          done < stale-branch-refs.tsv

          {
            echo "### Repository cleanup complete"
            echo
            echo "- Release tag: \`${RELEASE_TAG}\` → \`${RELEASE_SHA}\`"
            echo "- Stale branches: deleted after SHA revalidation"
            echo "- Recovery record: retained as a 90-day workflow artifact"
          } >> "${GITHUB_STEP_SUMMARY}"
