name: Delete merged branches

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  delete-merged-branch:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref != github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Delete unchanged merged head branch
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY}"
          if ! current_sha="$(gh api "repos/${repo}/git/ref/heads/${HEAD_BRANCH}" --jq '.object.sha' 2>/dev/null)"; then
            echo "Branch already absent: ${HEAD_BRANCH}"
            exit 0
          fi

          if [[ "${current_sha}" != "${EXPECTED_HEAD_SHA}" ]]; then
            echo "::warning::Branch moved after merge; preserving ${HEAD_BRANCH}."
            exit 0
          fi

          gh api \
            --method DELETE \
            "repos/${repo}/git/refs/heads/${HEAD_BRANCH}" \
            >/dev/null
          echo "Deleted merged branch: ${HEAD_BRANCH}"
