name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: d1-production-maintenance
  cancel-in-progress: false

jobs:
  deploy:
    name: approved production release
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: production
      url: https://hanlim-archive.skarhkdgus7.workers.dev
    defaults:
      run:
        working-directory: cloudflare-app
    env:
      CLOUDFLARE_ACCOUNT_ID: e2b9c1d94dc8f0f6e349bfbfb36cfa30
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PRODUCTION_URL: https://hanlim-archive.skarhkdgus7.workers.dev
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cloudflare-app/package-lock.json
      - run: npm ci
      - name: Verify exact release source
        run: npm run verify
      - name: Dependency audit
        run: npm run audit:dependencies
      - name: Build release evidence
        run: |
          npm run release:evidence -- --out release-evidence
          set -o pipefail
          npm run deploy:dry 2>&1 | tee release-evidence/bundle-report.txt
          npm audit --json > release-evidence/dependency-audit.json
      - name: Upload pre-mutation migration evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: migration-evidence-${{ github.sha }}
          path: |
            cloudflare-app/release-evidence/migration-manifest.json
            cloudflare-app/release-evidence/release-evidence.json
          if-no-files-found: error
          retention-days: 90
      - name: Capture current Worker version
        run: |
          npx wrangler deployments status --json > release-evidence/deployment-before.json
          PREVIOUS_VERSION_ID="$(jq -r '.versions[] | select(.percentage == 100) | .version_id' release-evidence/deployment-before.json)"
          test -n "$PREVIOUS_VERSION_ID"
          echo "PREVIOUS_VERSION_ID=$PREVIOUS_VERSION_ID" >> "$GITHUB_ENV"
      - name: Create encrypted pre-deploy D1 backup
        env:
          D1_BACKUP_PASSPHRASE: ${{ secrets.D1_BACKUP_PASSPHRASE }}
        run: |
          set +x
          set -euo pipefail
          umask 077
          : "${D1_BACKUP_PASSPHRASE:?production environment secret is required}"
          if [ "${#D1_BACKUP_PASSPHRASE}" -lt 32 ]; then
            echo "D1_BACKUP_PASSPHRASE must be at least 32 characters."
            exit 1
          fi
          STAMP="$(date -u +%Y%m%d-%H%M%S)"
          echo "BACKUP_STAMP=$STAMP" >> "$GITHUB_ENV"
          RAW_SQL="$RUNNER_TEMP/pre-deploy.sql"
          GZIP_SQL="$RUNNER_TEMP/pre-deploy.sql.gz"
          BACKUP_DIR="$GITHUB_WORKSPACE/cloudflare-app/release-backup"
          ENCRYPTED="$BACKUP_DIR/hanlim-archive-${GITHUB_SHA}-${STAMP}.sql.gz.enc"
          mkdir -p "$BACKUP_DIR"
          cleanup() {
            command -v shred >/dev/null 2>&1 && shred -u "$RAW_SQL" "$GZIP_SQL" 2>/dev/null || rm -f "$RAW_SQL" "$GZIP_SQL"
          }
          trap cleanup EXIT
          npx wrangler d1 export hanlim-archive --remote --output "$RAW_SQL" > "$RUNNER_TEMP/d1-export.log" 2>&1
          gzip -c "$RAW_SQL" > "$GZIP_SQL"
          openssl enc -aes-256-cbc -salt -pbkdf2 -iter 200000 \
            -in "$GZIP_SQL" -out "$ENCRYPTED" -pass env:D1_BACKUP_PASSPHRASE
          (cd "$BACKUP_DIR" && sha256sum "$(basename "$ENCRYPTED")" > "$(basename "$ENCRYPTED").sha256")
          echo "Encrypted pre-deploy backup created."
      - name: Upload pre-deploy backup
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pre-deploy-d1-${{ github.sha }}-${{ env.BACKUP_STAMP }}
          path: cloudflare-app/release-backup/
          if-no-files-found: error
          retention-days: 90
      - name: Apply D1 migrations
        run: |
          set -o pipefail
          npx wrangler d1 migrations apply hanlim-archive --remote 2>&1 | tee release-evidence/migration-apply.txt
      - name: Deploy Worker
        run: |
          set -o pipefail
          npx wrangler deploy 2>&1 | tee release-evidence/deploy.txt
      - name: Capture deployed Worker version
        run: npx wrangler versions list --json > release-evidence/versions-after.json
      - name: Post-deploy login and read-only search smoke
        id: smoke
        continue-on-error: true
        env:
          SMOKE_BASE_URL: ${{ env.PRODUCTION_URL }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: |
          set -o pipefail
          npm run smoke:release 2>&1 | tee release-evidence/smoke.txt
      - name: Roll back Worker after smoke failure
        if: steps.smoke.outcome == 'failure'
        run: |
          set -o pipefail
          npx wrangler rollback "$PREVIOUS_VERSION_ID" --yes --message "Automated rollback after smoke failure for $GITHUB_SHA" 2>&1 | tee release-evidence/rollback.txt
      - name: Mark failed release
        if: steps.smoke.outcome == 'failure'
        run: exit 1
      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-release-${{ github.sha }}-${{ github.run_id }}
          path: cloudflare-app/release-evidence/
          if-no-files-found: error
          retention-days: 90
