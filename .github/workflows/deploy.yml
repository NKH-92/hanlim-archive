name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: d1-production-maintenance
  cancel-in-progress: false

jobs:
  deploy:
    name: approved production release
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: production
      url: https://hanlim-archive.skarhkdgus7.workers.dev
    defaults:
      run:
        working-directory: cloudflare-app
    env:
      CLOUDFLARE_ACCOUNT_ID: e2b9c1d94dc8f0f6e349bfbfb36cfa30
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ENV: production
      D1_MIGRATE_ENV: production
      D1_TARGET_DATABASE_ID: 1262ca00-b431-490c-aad2-539d77d4f73f
      PRODUCTION_URL: https://hanlim-archive.skarhkdgus7.workers.dev
      SMOKE_ALLOWED_HOSTS: hanlim-archive.skarhkdgus7.workers.dev
      WORKER_VERSION_TAG: release-${{ github.sha }}
      WORKER_VERSION_MESSAGE: release-sha:${{ github.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Enforce production release from main
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Production release must run from refs/heads/main."
            exit 1
          fi
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cloudflare-app/package-lock.json
      - name: Verify released migrations against release base
        env:
          EVENT_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          RELEASED_BASE_SHA="$EVENT_BEFORE_SHA"
          if ! [[ "$RELEASED_BASE_SHA" =~ ^[a-f0-9]{40}$ ]] || [[ "$RELEASED_BASE_SHA" =~ ^0+$ ]]; then
            RELEASED_BASE_SHA="$(git rev-parse "$GITHUB_SHA^1")"
          fi
          node scripts/check-released-baseline-history.mjs --base-ref "$RELEASED_BASE_SHA"
      - run: npm ci
      - name: Verify exact release source
        run: npm run verify
      - name: Dependency audit
        run: npm run audit:dependencies
      - name: Build release evidence
        run: |
          npm run release:evidence -- --out release-evidence
          set -o pipefail
          npm run deploy:dry 2>&1 | tee release-evidence/bundle-report.txt
          npm audit --json > release-evidence/dependency-audit.json
      - name: Upload pre-mutation migration evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: migration-evidence-${{ github.sha }}
          path: |
            cloudflare-app/release-evidence/migration-manifest.json
            cloudflare-app/release-evidence/release-evidence.json
          if-no-files-found: error
          retention-days: 90
      - name: Capture current Worker version
        run: |
          npx wrangler deployments status --env production --json > release-evidence/deployment-before.json
          jq -e '([.versions[] | select(.percentage == 100)] | length) == 1' release-evidence/deployment-before.json
          ORIGINAL_VERSION_ID="$(jq -r '.versions[] | select(.percentage == 100) | .version_id' release-evidence/deployment-before.json)"
          test -n "$ORIGINAL_VERSION_ID"
          npx wrangler versions view "$ORIGINAL_VERSION_ID" --env production --json \
            > release-evidence/version-before.json
          echo "ORIGINAL_VERSION_ID=$ORIGINAL_VERSION_ID" >> "$GITHUB_ENV"
      - name: Verify independent administrator before migration
        env:
          D1_ADMIN_CHECK_PHASE: pre-migration
        run: npm run admin:check:remote
      - name: Verify independent administrator login before migration
        env:
          SMOKE_BASE_URL: ${{ env.PRODUCTION_URL }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          SMOKE_ADMIN_USERNAME: ${{ secrets.SMOKE_ADMIN_USERNAME }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          SMOKE_REQUIRE_ADMIN: "1"
        run: |
          set -o pipefail
          npm run smoke:release 2>&1 | tee release-evidence/pre-migration-admin-smoke.txt
      - name: Detect session-epoch rollback compatibility
        id: rollback_compat
        continue-on-error: true
        env:
          SMOKE_BASE_URL: ${{ env.PRODUCTION_URL }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          SMOKE_ADMIN_USERNAME: ${{ secrets.SMOKE_ADMIN_USERNAME }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          SMOKE_REQUIRE_ADMIN: "1"
          SMOKE_REQUIRE_SESSION_EPOCH_COMPAT: "1"
        run: |
          set -o pipefail
          npm run smoke:release 2>&1 | tee release-evidence/rollback-compatibility-before.txt
      - name: Prepare and verify session-epoch compatibility Worker
        id: compat_prepare
        if: steps.rollback_compat.outcome == 'failure'
        continue-on-error: true
        env:
          COMPAT_BASE_SHA: ${{ github.event.before }}
          APPROVED_LIVE_SOURCE_SHA: ${{ vars.PRODUCTION_SOURCE_SHA }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" != "push" ]; then
            echo "First-time compatibility bootstrap is allowed only in the exact main push release."
            exit 1
          fi
          if ! [[ "$COMPAT_BASE_SHA" =~ ^[a-f0-9]{40}$ ]] || [[ "$COMPAT_BASE_SHA" =~ ^0+$ ]]; then
            echo "github.event.before must be a non-zero 40-character SHA."
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$(git rev-parse "$GITHUB_SHA^1")" = "$COMPAT_BASE_SHA"
          if ! [[ "$APPROVED_LIVE_SOURCE_SHA" =~ ^[a-f0-9]{40}$ ]]; then
            echo "production Environment variable PRODUCTION_SOURCE_SHA must attest the live Worker source."
            exit 1
          fi
          test "$APPROVED_LIVE_SOURCE_SHA" = "$COMPAT_BASE_SHA"
          COMPAT_ROOT="$RUNNER_TEMP/session-epoch-compat"
          git worktree add --detach "$COMPAT_ROOT" "$COMPAT_BASE_SHA"
          COMPAT_APP_ROOT="$COMPAT_ROOT/cloudflare-app"
          echo "COMPAT_APP_ROOT=$COMPAT_APP_ROOT" >> "$GITHUB_ENV"
          node scripts/apply-session-epoch-compat.mjs --app-root "$COMPAT_APP_ROOT" \
            > release-evidence/session-epoch-compat-files.json
          git -C "$COMPAT_ROOT" diff --check
          git -C "$COMPAT_ROOT" diff --name-only > release-evidence/session-epoch-compat-diff.txt
          EXPECTED_FILES="$(printf '%s\n' \
            cloudflare-app/src/auth/passwords.js \
            cloudflare-app/src/auth/session.js \
            cloudflare-app/src/auth/users.js \
            cloudflare-app/src/handlers/adminHandlers.js \
            cloudflare-app/src/handlers/sessionHandlers.js \
            cloudflare-app/src/index.js \
            cloudflare-app/wrangler.jsonc)"
          test "$(cat release-evidence/session-epoch-compat-diff.txt)" = "$EXPECTED_FILES"
          sha256sum scripts/apply-session-epoch-compat.mjs \
            > release-evidence/session-epoch-compat-transform.sha256
          jq -n --arg releaseSha "$GITHUB_SHA" --arg baseSha "$COMPAT_BASE_SHA" \
            --arg approvedLiveSourceSha "$APPROVED_LIVE_SOURCE_SHA" \
            '{releaseSha: $releaseSha, baseSha: $baseSha, approvedLiveSourceSha: $approvedLiveSourceSha}' \
            > release-evidence/session-epoch-compat-source.json
          cd "$COMPAT_APP_ROOT"
          npm ci
          npm run build:browser
          npm run check
          npm run typecheck
          npm run lint
          npm run format:check
          npm run check:migrations
          npm run check:routes
          npm run check:browser
          node "$GITHUB_WORKSPACE/cloudflare-app/scripts/verify-session-epoch-compat.mjs" \
            --compat-app-root "$COMPAT_APP_ROOT" \
            --release-app-root "$GITHUB_WORKSPACE/cloudflare-app"
          export WORKER_VERSION_TAG="compat-$COMPAT_BASE_SHA"
          export WORKER_VERSION_MESSAGE="session-epoch-compat-base:$COMPAT_BASE_SHA release:$GITHUB_SHA"
          set -o pipefail
          node "$GITHUB_WORKSPACE/cloudflare-app/scripts/deploy-guarded.mjs" \
            --app-root "$COMPAT_APP_ROOT" --dry-run 2>&1 \
            | tee "$GITHUB_WORKSPACE/cloudflare-app/release-evidence/session-epoch-compat-bundle.txt"
          FINAL_DIFF="$GITHUB_WORKSPACE/cloudflare-app/release-evidence/session-epoch-compat-final-diff.txt"
          FINAL_UNTRACKED="$GITHUB_WORKSPACE/cloudflare-app/release-evidence/session-epoch-compat-final-untracked.txt"
          FINAL_HASHES="$GITHUB_WORKSPACE/cloudflare-app/release-evidence/session-epoch-compat-final-hashes.sha256"
          git -C "$COMPAT_ROOT" diff --check
          git -C "$COMPAT_ROOT" diff --name-only > "$FINAL_DIFF"
          git -C "$COMPAT_ROOT" ls-files --others --exclude-standard > "$FINAL_UNTRACKED"
          test "$(cat "$FINAL_DIFF")" = "$EXPECTED_FILES"
          test ! -s "$FINAL_UNTRACKED"
          : > "$FINAL_HASHES"
          while IFS=$'\t' read -r file expected_hash; do
            actual_hash="$(sha256sum "$file" | cut -d ' ' -f 1)"
            test "$actual_hash" = "$expected_hash"
            printf '%s  %s\n' "$actual_hash" "$file" >> "$FINAL_HASHES"
          done < <(jq -r '.hashes | to_entries[] | [.key, .value] | @tsv' \
            "$GITHUB_WORKSPACE/cloudflare-app/release-evidence/session-epoch-compat-files.json")
      - name: Deploy session-epoch compatibility Worker without migrations
        id: compat_deploy
        if: steps.rollback_compat.outcome == 'failure' && steps.compat_prepare.outcome == 'success'
        continue-on-error: true
        env:
          WORKER_VERSION_TAG: compat-${{ github.event.before }}
          WORKER_VERSION_MESSAGE: session-epoch-compat-base:${{ github.event.before }} release:${{ github.sha }}
        run: |
          set -o pipefail
          node "$GITHUB_WORKSPACE/cloudflare-app/scripts/deploy-guarded.mjs" \
            --app-root "$COMPAT_APP_ROOT" 2>&1 \
            | tee "$GITHUB_WORKSPACE/cloudflare-app/release-evidence/session-epoch-compat-deploy.txt"
      - name: Verify session-epoch compatibility Worker
        id: compat_smoke
        if: steps.rollback_compat.outcome == 'failure' && steps.compat_deploy.outcome == 'success'
        continue-on-error: true
        env:
          SMOKE_BASE_URL: ${{ env.PRODUCTION_URL }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          SMOKE_ADMIN_USERNAME: ${{ secrets.SMOKE_ADMIN_USERNAME }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          SMOKE_REQUIRE_ADMIN: "1"
          SMOKE_REQUIRE_SESSION_EPOCH_COMPAT: "1"
        run: |
          set -o pipefail
          npm run smoke:release 2>&1 | tee release-evidence/session-epoch-compat-smoke.txt
      - name: Capture compatible rollback Worker version
        id: compat_capture
        if: steps.rollback_compat.outcome == 'failure' && steps.compat_smoke.outcome == 'success'
        continue-on-error: true
        env:
          WORKER_VERSION_TAG: compat-${{ github.event.before }}
          WORKER_VERSION_MESSAGE: session-epoch-compat-base:${{ github.event.before }} release:${{ github.sha }}
        run: |
          npx wrangler deployments status --env production --json > release-evidence/deployment-compat.json
          jq -e '([.versions[] | select(.percentage == 100)] | length) == 1' release-evidence/deployment-compat.json
          COMPAT_VERSION_ID="$(jq -r '.versions[] | select(.percentage == 100) | .version_id' release-evidence/deployment-compat.json)"
          test -n "$COMPAT_VERSION_ID"
          test "$COMPAT_VERSION_ID" != "$ORIGINAL_VERSION_ID"
          npx wrangler versions view "$COMPAT_VERSION_ID" --env production --json \
            > release-evidence/version-compat.json
          jq -e --arg id "$COMPAT_VERSION_ID" --arg tag "$WORKER_VERSION_TAG" \
            --arg message "$WORKER_VERSION_MESSAGE" \
            '.id == $id and .annotations["workers/tag"] == $tag and .annotations["workers/message"] == $message' \
            release-evidence/version-compat.json
          echo "PREVIOUS_VERSION_ID=$COMPAT_VERSION_ID" >> "$GITHUB_ENV"
      - name: Keep current compatible Worker as rollback target
        if: steps.rollback_compat.outcome == 'success'
        run: echo "PREVIOUS_VERSION_ID=$ORIGINAL_VERSION_ID" >> "$GITHUB_ENV"
      - name: Roll back failed compatibility bootstrap
        if: >-
          always() && steps.rollback_compat.outcome == 'failure' &&
          (steps.compat_deploy.outcome == 'failure' || steps.compat_smoke.outcome == 'failure' || steps.compat_capture.outcome == 'failure')
        env:
          SMOKE_BASE_URL: ${{ env.PRODUCTION_URL }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          SMOKE_ADMIN_USERNAME: ${{ secrets.SMOKE_ADMIN_USERNAME }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          SMOKE_REQUIRE_ADMIN: "1"
        run: |
          set -o pipefail
          npx wrangler rollback "$ORIGINAL_VERSION_ID" --env production --yes \
            --message "Rollback failed session-epoch compatibility bootstrap for $GITHUB_SHA" 2>&1 \
            | tee release-evidence/session-epoch-compat-rollback.txt
          npx wrangler deployments status --env production --json \
            > release-evidence/deployment-compat-rollback.json
          jq -e '([.versions[] | select(.percentage == 100)] | length) == 1' \
            release-evidence/deployment-compat-rollback.json
          ROLLED_BACK_VERSION_ID="$(jq -r '.versions[] | select(.percentage == 100) | .version_id' \
            release-evidence/deployment-compat-rollback.json)"
          test "$ROLLED_BACK_VERSION_ID" = "$ORIGINAL_VERSION_ID"
          npm run smoke:release 2>&1 | tee release-evidence/session-epoch-compat-rollback-smoke.txt
      - name: Mark failed compatibility bootstrap
        if: >-
          always() && steps.rollback_compat.outcome == 'failure' &&
          (steps.compat_prepare.outcome != 'success' || steps.compat_deploy.outcome != 'success' ||
          steps.compat_smoke.outcome != 'success' || steps.compat_capture.outcome != 'success')
        run: exit 1
      - name: Enforce epoch-aware rollback target before database mutation
        env:
          SMOKE_BASE_URL: ${{ env.PRODUCTION_URL }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          SMOKE_ADMIN_USERNAME: ${{ secrets.SMOKE_ADMIN_USERNAME }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          SMOKE_REQUIRE_ADMIN: "1"
          SMOKE_REQUIRE_SESSION_EPOCH_COMPAT: "1"
        run: |
          test -n "$PREVIOUS_VERSION_ID"
          export SMOKE_EXPECTED_WORKER_VERSION="$PREVIOUS_VERSION_ID"
          set -o pipefail
          npm run smoke:release 2>&1 | tee release-evidence/rollback-target-smoke.txt
      - name: Create encrypted pre-deploy D1 backup
        env:
          D1_BACKUP_PASSPHRASE: ${{ secrets.D1_BACKUP_PASSPHRASE }}
        run: |
          set +x
          set -euo pipefail
          umask 077
          : "${D1_BACKUP_PASSPHRASE:?production environment secret is required}"
          if [ "${#D1_BACKUP_PASSPHRASE}" -lt 32 ]; then
            echo "D1_BACKUP_PASSPHRASE must be at least 32 characters."
            exit 1
          fi
          STAMP="$(date -u +%Y%m%d-%H%M%S)"
          echo "BACKUP_STAMP=$STAMP" >> "$GITHUB_ENV"
          RAW_SQL="$RUNNER_TEMP/pre-deploy.sql"
          GZIP_SQL="$RUNNER_TEMP/pre-deploy.sql.gz"
          BACKUP_DIR="$GITHUB_WORKSPACE/cloudflare-app/release-backup"
          ENCRYPTED="$BACKUP_DIR/hanlim-archive-${GITHUB_SHA}-${STAMP}.sql.gz.enc"
          mkdir -p "$BACKUP_DIR"
          cleanup() {
            command -v shred >/dev/null 2>&1 && shred -u "$RAW_SQL" "$GZIP_SQL" 2>/dev/null || rm -f "$RAW_SQL" "$GZIP_SQL"
          }
          trap cleanup EXIT
          npx wrangler d1 export hanlim-archive --remote --env production --output "$RAW_SQL" > "$RUNNER_TEMP/d1-export.log" 2>&1
          UPGRADE_READINESS_STATUS=0
          node scripts/check-upgrade-readiness.mjs \
            --sql-export "$RAW_SQL" \
            --out "$GITHUB_WORKSPACE/cloudflare-app/release-evidence/upgrade-readiness.json" \
            || UPGRADE_READINESS_STATUS=$?
          echo "UPGRADE_READINESS_STATUS=$UPGRADE_READINESS_STATUS" >> "$GITHUB_ENV"
          gzip -c "$RAW_SQL" > "$GZIP_SQL"
          openssl enc -aes-256-cbc -salt -pbkdf2 -iter 200000 \
            -in "$GZIP_SQL" -out "$ENCRYPTED" -pass env:D1_BACKUP_PASSPHRASE
          (cd "$BACKUP_DIR" && sha256sum "$(basename "$ENCRYPTED")" > "$(basename "$ENCRYPTED").sha256")
          echo "Encrypted pre-deploy backup created."
      - name: Upload pre-deploy backup
        id: backup_upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pre-deploy-d1-${{ github.sha }}-${{ env.BACKUP_STAMP }}
          path: cloudflare-app/release-backup/
          if-no-files-found: error
          retention-days: 90
      - name: Enforce production upgrade data preconditions
        run: |
          if [ "${UPGRADE_READINESS_STATUS:-1}" != "0" ]; then
            cat release-evidence/upgrade-readiness.json
            exit 1
          fi
      - name: Apply D1 migrations
        env:
          D1_BACKUP_EVIDENCE_ID: ${{ steps.backup_upload.outputs.artifact-id }}
          D1_BACKUP_EVIDENCE_DIGEST: ${{ steps.backup_upload.outputs.artifact-digest }}
          D1_MIGRATE_APPROVAL_CONTEXT: github-environment:production:${{ github.run_id }}:${{ github.sha }}
          D1_MIGRATE_DRY_RUN: "0"
        run: |
          set -o pipefail
          npm run db:migrate:remote 2>&1 | tee release-evidence/migration-apply.txt
      - name: Verify independent administrator after migration
        env:
          D1_ADMIN_CHECK_PHASE: post-migration
        run: npm run admin:check:remote
      - name: Deploy Worker
        id: deploy_worker
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/deploy-guarded.mjs 2>&1 | tee release-evidence/deploy.txt
      - name: Capture deployed Worker version
        id: capture_deployed
        continue-on-error: true
        run: |
          npx wrangler versions list --env production --json > release-evidence/versions-after.json
          npx wrangler deployments status --env production --json > release-evidence/deployment-after.json
          jq -e '([.versions[] | select(.percentage == 100)] | length) == 1' release-evidence/deployment-after.json
          DEPLOYED_VERSION_ID="$(jq -r '.versions[] | select(.percentage == 100) | .version_id' release-evidence/deployment-after.json)"
          test -n "$DEPLOYED_VERSION_ID"
          test "$DEPLOYED_VERSION_ID" != "$PREVIOUS_VERSION_ID"
          npx wrangler versions view "$DEPLOYED_VERSION_ID" --env production --json \
            > release-evidence/version-after.json
          jq -e --arg id "$DEPLOYED_VERSION_ID" --arg tag "$WORKER_VERSION_TAG" \
            --arg message "$WORKER_VERSION_MESSAGE" \
            '.id == $id and .annotations["workers/tag"] == $tag and .annotations["workers/message"] == $message' \
            release-evidence/version-after.json
          echo "DEPLOYED_VERSION_ID=$DEPLOYED_VERSION_ID" >> "$GITHUB_ENV"
      - name: Post-deploy login and read-only search smoke
        id: smoke
        if: steps.deploy_worker.outcome == 'success' && steps.capture_deployed.outcome == 'success'
        continue-on-error: true
        env:
          SMOKE_BASE_URL: ${{ env.PRODUCTION_URL }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          SMOKE_ADMIN_USERNAME: ${{ secrets.SMOKE_ADMIN_USERNAME }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          SMOKE_REQUIRE_ADMIN: "1"
          SMOKE_REQUIRE_SESSION_EPOCH_COMPAT: "1"
        run: |
          export SMOKE_EXPECTED_WORKER_VERSION="$DEPLOYED_VERSION_ID"
          set -o pipefail
          npm run smoke:release 2>&1 | tee release-evidence/smoke.txt
      - name: Roll back Worker after release failure
        if: >-
          always() && (steps.deploy_worker.outcome != 'success' ||
          steps.capture_deployed.outcome != 'success' || steps.smoke.outcome != 'success')
        env:
          SMOKE_BASE_URL: ${{ env.PRODUCTION_URL }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          SMOKE_ADMIN_USERNAME: ${{ secrets.SMOKE_ADMIN_USERNAME }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          SMOKE_REQUIRE_ADMIN: "1"
          SMOKE_REQUIRE_SESSION_EPOCH_COMPAT: "1"
        run: |
          set -euo pipefail
          test -n "$PREVIOUS_VERSION_ID"
          CURRENT_VERSION_ID=""
          if npx wrangler deployments status --env production --json \
              > release-evidence/deployment-failed-release-before-rollback.json \
              && jq -e '([.versions[] | select(.percentage == 100)] | length) == 1' \
                release-evidence/deployment-failed-release-before-rollback.json > /dev/null; then
            CURRENT_VERSION_ID="$(jq -r '.versions[] | select(.percentage == 100) | .version_id' \
              release-evidence/deployment-failed-release-before-rollback.json)"
          fi
          set -o pipefail
          if [ "$CURRENT_VERSION_ID" != "$PREVIOUS_VERSION_ID" ]; then
            npx wrangler rollback "$PREVIOUS_VERSION_ID" --env production --yes \
              --message "Automated rollback after release failure for $GITHUB_SHA" 2>&1 \
              | tee release-evidence/rollback.txt
          else
            echo "Rollback target already has 100% traffic: $PREVIOUS_VERSION_ID" \
              | tee release-evidence/rollback.txt
          fi
          npx wrangler deployments status --env production --json \
            > release-evidence/deployment-rollback.json
          jq -e '([.versions[] | select(.percentage == 100)] | length) == 1' \
            release-evidence/deployment-rollback.json
          ROLLED_BACK_VERSION_ID="$(jq -r '.versions[] | select(.percentage == 100) | .version_id' \
            release-evidence/deployment-rollback.json)"
          test "$ROLLED_BACK_VERSION_ID" = "$PREVIOUS_VERSION_ID"
          npx wrangler versions view "$ROLLED_BACK_VERSION_ID" --env production --json \
            > release-evidence/version-rollback.json
          export SMOKE_EXPECTED_WORKER_VERSION="$PREVIOUS_VERSION_ID"
          npm run smoke:release 2>&1 | tee release-evidence/rollback-smoke.txt
      - name: Mark failed release
        if: >-
          always() && (steps.deploy_worker.outcome != 'success' ||
          steps.capture_deployed.outcome != 'success' || steps.smoke.outcome != 'success')
        run: exit 1
      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-release-${{ github.sha }}-${{ github.run_id }}
          path: cloudflare-app/release-evidence/
          if-no-files-found: error
          retention-days: 90
