name: Deploy

# main 브랜치에 push되면: 테스트 통과 → D1 마이그레이션 적용 → Workers 배포까지 자동으로 수행한다.
# 목적: 사람이 wrangler 명령을 직접 칠 필요 없이, 코드 변경을 push만 하면 운영에 반영되도록 한다.
# 등록이 필요한 시크릿은 딱 하나다(Settings > Secrets and variables > Actions):
#   - CLOUDFLARE_API_TOKEN : Workers Scripts=Edit + D1=Edit 권한의 스코프드 토큰
# 계정 ID는 비밀정보가 아니므로 아래 env에 직접 적어 둔다(토큰 없이는 아무 것도 못 함).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# 배포는 동시에 하나만 진행되도록 직렬화한다(중복 배포로 인한 경합 방지).
concurrency:
  # 주간 D1 전체 export와 migration/deploy가 동시에 운영 DB를 점유하지 않게 같은 그룹을 쓴다.
  group: d1-production-maintenance
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-app
    env:
      CLOUDFLARE_ACCOUNT_ID: e2b9c1d94dc8f0f6e349bfbfb36cfa30
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudflare-app/package-lock.json
      - run: npm ci
      # 배포 전 필수 상태검사: 문법 검사 + 단위 테스트가 통과해야만 다음 단계로 넘어간다.
      - run: npm run check
      - run: npm test
      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply hanlim-archive --remote
      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
