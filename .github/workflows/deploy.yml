name: Deploy Production

on:
  push:
    branches: [main]
    paths:
      - "cloudflare-app/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: d1-production-maintenance
  cancel-in-progress: false

jobs:
  deploy:
    name: approved free-tier production release
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production
      url: https://hanlim-archive.skarhkdgus7.workers.dev
    defaults:
      run:
        working-directory: cloudflare-app
    env:
      CLOUDFLARE_ACCOUNT_ID: e2b9c1d94dc8f0f6e349bfbfb36cfa30
      CLOUDFLARE_ENV: production
      D1_MIGRATE_ENV: production
      D1_RECOVERY_ENV: production
      D1_TARGET_DATABASE_ID: 1262ca00-b431-490c-aad2-539d77d4f73f
      SEARCH_D1_TARGET_DATABASE_ID: ${{ vars.SEARCH_D1_TARGET_DATABASE_ID }}
      PRODUCTION_URL: https://hanlim-archive.skarhkdgus7.workers.dev
      SMOKE_ALLOWED_HOSTS: hanlim-archive.skarhkdgus7.workers.dev
      WORKER_VERSION_TAG: release-${{ github.sha }}
      WORKER_VERSION_MESSAGE: release-sha:${{ github.sha }}
      RELEASE_SMOKE_OPERATION_ID: release-${{ github.run_id }}-${{ github.sha }}
      D1_RECOVERY_EVIDENCE_PATH: ${{ github.workspace }}/cloudflare-app/release-evidence/d1-recovery.json
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Initialize release-scoped credential path
        run: echo "RELEASE_SMOKE_CREDENTIAL_PATH=$RUNNER_TEMP/release-smoke-credentials.json" >> "$GITHUB_ENV"
      - name: Enforce production release from main
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Production release must run from refs/heads/main."
            exit 1
          fi
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cloudflare-app/package-lock.json
      - name: Verify released migrations against release base
        env:
          EVENT_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          RELEASED_BASE_SHA="$EVENT_BEFORE_SHA"
          if ! [[ "$RELEASED_BASE_SHA" =~ ^[a-f0-9]{40}$ ]] || [[ "$RELEASED_BASE_SHA" =~ ^0+$ ]]; then
            RELEASED_BASE_SHA="$(git rev-parse "$GITHUB_SHA^1")"
          fi
          node scripts/check-released-baseline-history.mjs --base-ref "$RELEASED_BASE_SHA"
      - run: npm ci
      - name: Verify exact release source
        run: npm run verify
      - name: Dependency audit
        run: npm run audit:dependencies
      - name: Build release evidence
        run: |
          npm run release:evidence -- --out release-evidence
          set -o pipefail
          npm run deploy:dry 2>&1 | tee release-evidence/bundle-report.txt
          npm audit --json > release-evidence/dependency-audit.json
      - name: Capture current Worker rollback target
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_DEPLOY_API_TOKEN }}
        run: |
          set -euo pipefail
          npx wrangler deployments status --env production --json > release-evidence/deployment-before.json
          jq -e '([.versions[] | select(.percentage == 100)] | length) == 1' release-evidence/deployment-before.json
          PREVIOUS_VERSION_ID="$(jq -r '.versions[] | select(.percentage == 100) | .version_id' release-evidence/deployment-before.json)"
          test -n "$PREVIOUS_VERSION_ID"
          npx wrangler versions view "$PREVIOUS_VERSION_ID" --env production --json \
            > release-evidence/version-before.json
          echo "PREVIOUS_VERSION_ID=$PREVIOUS_VERSION_ID" >> "$GITHUB_ENV"
      - name: Verify independent administrator before migration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_MIGRATE_API_TOKEN }}
          D1_ADMIN_CHECK_PHASE: pre-migration
        run: npm run admin:check:remote
      - name: Capture Core and Search D1 Time Travel recovery points
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_MIGRATE_API_TOKEN }}
        run: npm run recovery:d1:time-travel
      - name: Provision release-scoped smoke principals
        id: provision_smoke
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_MIGRATE_API_TOKEN }}
          D1_PROVISION_ENV: production
        run: npm run smoke:principal -- --action provision
      - name: Verify current production before migration
        env:
          SMOKE_BASE_URL: ${{ env.PRODUCTION_URL }}
          SMOKE_REQUIRE_ADMIN: "1"
          SMOKE_REQUIRE_SESSION_EPOCH_COMPAT: "1"
        run: |
          export SMOKE_USERNAME="$(jq -r .reader.username "$RELEASE_SMOKE_CREDENTIAL_PATH")"
          export SMOKE_PASSWORD="$(jq -r .reader.password "$RELEASE_SMOKE_CREDENTIAL_PATH")"
          export SMOKE_ADMIN_USERNAME="$(jq -r .admin.username "$RELEASE_SMOKE_CREDENTIAL_PATH")"
          export SMOKE_ADMIN_PASSWORD="$(jq -r .admin.password "$RELEASE_SMOKE_CREDENTIAL_PATH")"
          export SMOKE_EXPECTED_WORKER_VERSION="$PREVIOUS_VERSION_ID"
          set -o pipefail
          npm run smoke:release 2>&1 | tee release-evidence/pre-migration-smoke.txt
      - name: Upload pre-mutation recovery and migration evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pre-mutation-evidence-${{ github.sha }}-${{ github.run_id }}
          path: |
            cloudflare-app/release-evidence/d1-recovery.json
            cloudflare-app/release-evidence/migration-manifest.json
            cloudflare-app/release-evidence/release-evidence.json
          if-no-files-found: error
          retention-days: 8
      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_MIGRATE_API_TOKEN }}
          D1_MIGRATE_APPROVAL_CONTEXT: github-environment:production:${{ github.run_id }}:${{ github.sha }}
          D1_MIGRATE_DRY_RUN: "0"
        run: |
          set -o pipefail
          npm run db:migrate:remote 2>&1 | tee release-evidence/migration-apply.txt
      - name: Verify independent administrator after migration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_MIGRATE_API_TOKEN }}
          D1_ADMIN_CHECK_PHASE: post-migration
        run: npm run admin:check:remote
      - name: Deploy Worker directly to production
        id: deploy_worker
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_DEPLOY_API_TOKEN }}
        run: |
          set -o pipefail
          node scripts/deploy-guarded.mjs 2>&1 | tee release-evidence/deploy.txt
      - name: Capture deployed Worker version
        id: capture_deployed
        if: steps.deploy_worker.outcome == 'success'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_DEPLOY_API_TOKEN }}
        run: |
          set -euo pipefail
          npx wrangler deployments status --env production --json > release-evidence/deployment-after.json
          jq -e '([.versions[] | select(.percentage == 100)] | length) == 1' release-evidence/deployment-after.json
          DEPLOYED_VERSION_ID="$(jq -r '.versions[] | select(.percentage == 100) | .version_id' release-evidence/deployment-after.json)"
          test -n "$DEPLOYED_VERSION_ID"
          test "$DEPLOYED_VERSION_ID" != "$PREVIOUS_VERSION_ID"
          npx wrangler versions view "$DEPLOYED_VERSION_ID" --env production --json \
            > release-evidence/version-after.json
          jq -e --arg id "$DEPLOYED_VERSION_ID" --arg tag "$WORKER_VERSION_TAG" \
            --arg message "$WORKER_VERSION_MESSAGE" \
            '.id == $id and .annotations["workers/tag"] == $tag and .annotations["workers/message"] == $message' \
            release-evidence/version-after.json
          echo "DEPLOYED_VERSION_ID=$DEPLOYED_VERSION_ID" >> "$GITHUB_ENV"
      - name: Post-deploy transport, login and read-only search smoke
        id: smoke
        if: steps.deploy_worker.outcome == 'success' && steps.capture_deployed.outcome == 'success'
        continue-on-error: true
        env:
          SMOKE_BASE_URL: ${{ env.PRODUCTION_URL }}
          SMOKE_REQUIRE_ADMIN: "1"
          SMOKE_REQUIRE_SESSION_EPOCH_COMPAT: "1"
          SMOKE_REQUIRE_READINESS: "1"
          SMOKE_VERIFY_PUBLIC_SURFACE: "1"
          SMOKE_HEALTH_ATTEMPTS: "60"
          SMOKE_HEALTH_RETRY_MS: "2000"
        run: |
          export SMOKE_USERNAME="$(jq -r .reader.username "$RELEASE_SMOKE_CREDENTIAL_PATH")"
          export SMOKE_PASSWORD="$(jq -r .reader.password "$RELEASE_SMOKE_CREDENTIAL_PATH")"
          export SMOKE_ADMIN_USERNAME="$(jq -r .admin.username "$RELEASE_SMOKE_CREDENTIAL_PATH")"
          export SMOKE_ADMIN_PASSWORD="$(jq -r .admin.password "$RELEASE_SMOKE_CREDENTIAL_PATH")"
          export SMOKE_EXPECTED_WORKER_VERSION="$DEPLOYED_VERSION_ID"
          set -o pipefail
          npm run smoke:release 2>&1 | tee release-evidence/smoke.txt
      - name: Roll back Worker after release failure
        if: >-
          always() && (steps.deploy_worker.outcome == 'failure' ||
          steps.capture_deployed.outcome == 'failure' || steps.smoke.outcome == 'failure')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_DEPLOY_API_TOKEN }}
          SMOKE_BASE_URL: ${{ env.PRODUCTION_URL }}
          SMOKE_REQUIRE_ADMIN: "1"
          SMOKE_REQUIRE_SESSION_EPOCH_COMPAT: "1"
        run: |
          set -euo pipefail
          export SMOKE_USERNAME="$(jq -r .reader.username "$RELEASE_SMOKE_CREDENTIAL_PATH")"
          export SMOKE_PASSWORD="$(jq -r .reader.password "$RELEASE_SMOKE_CREDENTIAL_PATH")"
          export SMOKE_ADMIN_USERNAME="$(jq -r .admin.username "$RELEASE_SMOKE_CREDENTIAL_PATH")"
          export SMOKE_ADMIN_PASSWORD="$(jq -r .admin.password "$RELEASE_SMOKE_CREDENTIAL_PATH")"
          CURRENT_VERSION_ID=""
          if npx wrangler deployments status --env production --json \
              > release-evidence/deployment-failed-release-before-rollback.json \
              && jq -e '([.versions[] | select(.percentage == 100)] | length) == 1' \
                release-evidence/deployment-failed-release-before-rollback.json > /dev/null; then
            CURRENT_VERSION_ID="$(jq -r '.versions[] | select(.percentage == 100) | .version_id' \
              release-evidence/deployment-failed-release-before-rollback.json)"
          fi
          set -o pipefail
          if [ "$CURRENT_VERSION_ID" != "$PREVIOUS_VERSION_ID" ]; then
            npx wrangler rollback "$PREVIOUS_VERSION_ID" --env production --yes \
              --message "Automated rollback after release failure for $GITHUB_SHA" 2>&1 \
              | tee release-evidence/rollback.txt
          else
            echo "Rollback target already has 100% traffic: $PREVIOUS_VERSION_ID" \
              | tee release-evidence/rollback.txt
          fi
          npx wrangler deployments status --env production --json \
            > release-evidence/deployment-rollback.json
          ROLLED_BACK_VERSION_ID="$(jq -r '.versions[] | select(.percentage == 100) | .version_id' \
            release-evidence/deployment-rollback.json)"
          test "$ROLLED_BACK_VERSION_ID" = "$PREVIOUS_VERSION_ID"
          export SMOKE_EXPECTED_WORKER_VERSION="$PREVIOUS_VERSION_ID"
          npm run smoke:release 2>&1 | tee release-evidence/rollback-smoke.txt
      - name: Mark failed release
        if: >-
          always() && (steps.deploy_worker.outcome == 'failure' ||
          steps.capture_deployed.outcome == 'failure' || steps.smoke.outcome == 'failure')
        run: exit 1
      - name: Remove release-scoped smoke principals
        if: always() && steps.provision_smoke.outcome == 'success'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_MIGRATE_API_TOKEN }}
          D1_PROVISION_ENV: production
        run: npm run smoke:principal -- --action cleanup
      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-release-${{ github.sha }}-${{ github.run_id }}
          path: cloudflare-app/release-evidence/
          if-no-files-found: error
          retention-days: 8
