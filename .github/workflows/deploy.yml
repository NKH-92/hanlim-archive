name: Deploy

# main 브랜치에 push되면: 테스트 통과 → D1 마이그레이션 적용 → Workers 배포까지 자동으로 수행한다.
# 목적: 사람이 wrangler 명령을 직접 칠 필요 없이, 코드 변경을 push만 하면 운영에 반영되도록 한다.
# 필요 시크릿(리포지토리 Settings > Secrets and variables > Actions):
#   - CLOUDFLARE_API_TOKEN   : Workers Scripts=Edit + D1=Edit 권한의 스코프드 토큰
#   - CLOUDFLARE_ACCOUNT_ID  : Cloudflare 계정 ID
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# 배포는 동시에 하나만 진행되도록 직렬화한다(중복 배포로 인한 경합 방지).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudflare-app/package-lock.json
      - run: npm ci
      # 배포 전 필수 상태검사: 문법 검사 + 단위 테스트가 통과해야만 다음 단계로 넘어간다.
      - run: npm run check
      - run: npm test
      - name: Apply D1 migrations (remote)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply hanlim-archive --remote
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
