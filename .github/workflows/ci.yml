name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: required / verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cloudflare-app
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cloudflare-app/package-lock.json
      - run: npm ci
      - name: Verify source, contracts, migrations, and tests
        run: npm run verify
      - name: Dependency audit
        run: |
          mkdir -p release-evidence
          npm run audit:dependencies
          npm audit --json > release-evidence/dependency-audit.json
      - name: Migration and schema evidence
        run: npm run release:evidence -- --out release-evidence
      - name: Worker dry-run and bundle report
        run: |
          set -o pipefail
          npm run deploy:dry 2>&1 | tee release-evidence/bundle-report.txt
      - name: Upload CI evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-evidence-${{ github.sha }}
          path: cloudflare-app/release-evidence/
          if-no-files-found: error
          retention-days: 35
