name: CI

# 배포 전 필수 상태검사: 문법 검사 + 단위 테스트를 push/PR마다 강제한다.
# GMP 맥락에서 "테스트 통과"가 개발자 로컬에만 의존하지 않고 증빙·강제되도록 한다.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-app
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cloudflare-app/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test
