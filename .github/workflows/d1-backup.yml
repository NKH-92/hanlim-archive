name: D1 Backup

# Core·Search D1 전체를 주 1회 SQL 덤프로 내보내 age 암호화 후 비공개 R2에 보존한다.
# Cloudflare Time Travel(30일)로는 막지 못하는 계정 삭제·DB 손상·30일 초과·외부 감사 보존을 대비한다.
# 등록이 필요한 secret/variable(리포지토리 Settings > Secrets and variables > Actions):
#   - CLOUDFLARE_D1_BACKUP_API_TOKEN : 두 D1 export와 지정 R2 object read/write 전용 토큰
#   - R2_BACKUP_BUCKET : 비공개 백업 bucket
#   - BACKUP_AGE_RECIPIENT : GitHub 밖에서 보관하는 복구 private key의 public recipient
# 계정 ID는 비밀정보가 아니므로 아래 env에 직접 적어 둔다.
on:
  schedule:
    - cron: "0 18 * * 0" # 매주 일요일 18:00 UTC = 월요일 03:00 KST
  workflow_dispatch: {}

permissions:
  contents: read

# D1 export는 완료될 때까지 DB 요청을 막을 수 있으므로 운영 배포와 겹치지 않게 직렬화한다.
concurrency:
  group: d1-production-maintenance
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: cloudflare-app
    env:
      CLOUDFLARE_ACCOUNT_ID: e2b9c1d94dc8f0f6e349bfbfb36cfa30
      D1_BACKUP_ENV: production
      D1_TARGET_DATABASE_ID: 1262ca00-b431-490c-aad2-539d77d4f73f
      SEARCH_D1_TARGET_DATABASE_ID: ${{ vars.SEARCH_D1_TARGET_DATABASE_ID }}
      R2_BACKUP_BUCKET: ${{ vars.R2_BACKUP_BUCKET }}
      R2_BACKUP_PREFIX: scheduled
      BACKUP_AGE_RECIPIENT: ${{ vars.BACKUP_AGE_RECIPIENT }}
      BACKUP_RECEIPT_PATH: ${{ github.workspace }}/cloudflare-app/backup-evidence/backup-receipt.json
      BACKUP_REPLAY_REPORT_PATH: ${{ github.workspace }}/cloudflare-app/backup-evidence/migration-replay.json
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cloudflare-app/package-lock.json
      - run: npm ci
      - name: Install age encryption tool
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes age
          age --version
      - name: Export, replay, encrypt, and upload both D1 databases to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_BACKUP_API_TOKEN }}
        run: npm run backup:d1:r2
      - name: Upload non-sensitive backup receipt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: d1-backup-receipt-${{ github.run_id }}
          path: |
            cloudflare-app/backup-evidence/backup-receipt.json
            cloudflare-app/backup-evidence/migration-replay.json
          if-no-files-found: error
          retention-days: 90
